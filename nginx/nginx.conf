worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging format
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile        on;
    keepalive_timeout 65;

    # Gzip compression for text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 256;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), camera=(), microphone=()" always;

    # Upstream FastAPI application
    upstream api {
        server api:8000;
        keepalive 32;
    }

    # --------------------------------------------------------
    # HTTP → HTTPS redirect
    # --------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --------------------------------------------------------
    # HTTPS — main server
    # --------------------------------------------------------
    server {
        listen 443 ssl;
        http2 on;
        server_name _;   # Replace with your actual domain

        # SSL certificates (provisioned by Certbot / Let's Encrypt)
        ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # HSTS — tell browsers to always use HTTPS for this domain
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # --------------------------------------------------------
        # Static files — Office Add-in task pane (served by Nginx directly)
        # Nginx serving static files is ~10x faster than serving through Python.
        # --------------------------------------------------------
        location /addin/ {
            alias /usr/share/nginx/addin/;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
            # Required: manifest.xml must be served as XML
            types {
                application/xml xml;
                text/html       html htm;
                text/css        css;
                application/javascript js;
                image/jpeg      jpg jpeg;
                image/png       png;
                image/svg+xml   svg;
            }
        }

        # Manifest served at root for easy add-in installation URL
        location = /manifest.xml {
            alias /usr/share/nginx/addin/manifest.xml;
            add_header Content-Type "application/xml; charset=utf-8";
        }

        # --------------------------------------------------------
        # API — proxy to FastAPI
        # --------------------------------------------------------
        location /api/ {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;

            # Rate limiting — adjust to your expected traffic
            limit_req zone=api_limit burst=20 nodelay;
        }

        location /health {
            proxy_pass http://api;
            proxy_set_header Host $host;
            access_log off;  # Don't clutter access logs with health checks
        }

        location /ready {
            proxy_pass http://api;
            proxy_set_header Host $host;
            access_log off;
        }
    }

    # Rate limiting zone — 10 requests/second per IP
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
}
